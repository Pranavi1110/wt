<!DOCTYPE html>
<html>

<head>
    <title>Marks Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script>
        function calculateMarks() {
            let total = 0;
            let average = 0;
            let grade = "";

            // Loop through 5 subjects
            for (let i = 1; i <= 5; i++) {
                let mark = parseInt(document.getElementById("m" + i).value) || 0;

                if (mark < 0 || mark > 100) {
                    alert("Marks should be between 0 and 100");
                    document.getElementById("m" + i).value = 0;
                    mark = 0;
                }

                total += mark;
            }

            average = total / 5;

            // Grade calculation
            if (average >= 90) {
                grade = "A";
            } else if (average >= 80) {
                grade = "B";
            } else if (average >= 70) {
                grade = "C";
            } else if (average >= 60) {
                grade = "D";
            } else {
                grade = "F";
            }

            // Result Table
            let tableHtml = `
                <table border="1">
                    <tr>
                        <th>Total Marks</th>
                        <th>Average</th>
                        <th>Grade</th>
                    </tr>
                    <tr>
                        <td>${total}</td>
                        <td>${average.toFixed(2)}</td>
                        <td>${grade}</td>
                    </tr>
                </table>
            `;

            document.getElementById("resultTable").innerHTML = tableHtml;
        }
    </script>
</head>

<body>
    <h2>Marks Calculator</h2>

    <label>Subject 1:</label>
    <input type="number" id="m1" min="0" max="100"><br><br>

    <label>Subject 2:</label>
    <input type="number" id="m2" min="0" max="100"><br><br>

    <label>Subject 3:</label>
    <input type="number" id="m3" min="0" max="100"><br><br>

    <label>Subject 4:</label>
    <input type="number" id="m4" min="0" max="100"><br><br>

    <label>Subject 5:</label>
    <input type="number" id="m5" min="0" max="100"><br><br>

    <button onclick="calculateMarks()">Display Result</button>

    <br><br>

    <!-- Table will appear here -->
    <div id="resultTable"></div>

</body>

</html>
