<!DOCTYPE html>
<html>

<head>

    <title>Laptop Details</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 70%;
            margin: auto;
            background: white;
        }

        th,
        td {
            border: 1px solid black;
            padding: 10px;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        select {
            padding: 8px;
            margin: 20px;
        }
    </style>

    <script>
        let xmlData;

        function loadXML() {
            let xhttp = new XMLHttpRequest();
            xhttp.open("GET", "laptops.xml", false);
            xhttp.send();

            xmlData = xhttp.responseXML;

            displayData("all");
        }

        function displayData(filter) {
            let data = xmlData.getElementsByTagName("laptop");

            let table = "<table>";
            table += "<tr><th>Brand</th><th>Model</th><th>Price</th><th>Processor</th></tr>";

            for (let i = 0; i < data.length; i++) {
                let brand = data[i].getElementsByTagName("brand")[0].textContent;
                let model = data[i].getElementsByTagName("model")[0].textContent;
                let price = data[i].getElementsByTagName("price")[0].textContent;
                let processor = data[i].getElementsByTagName("processor")[0].textContent;

                if (filter == "all" || processor == filter) {
                    table += "<tr>" +
                        "<td>" + brand + "</td>" +
                        "<td>" + model + "</td>" +
                        "<td>" + price + "</td>" +
                        "<td>" + processor + "</td>" +
                        "</tr>";
                }
            }

            table += "</table>";

            document.getElementById("result").innerHTML = table;
        }
    </script>

</head>

<body onload="loadXML()">

    <h2>Laptop Details</h2>

    <select onchange="displayData(this.value)">
        <option value="all">All</option>
        <option value="i5">i5</option>
        <option value="i7">i7</option>
        <option value="i9">i9</option>
    </select>

    <div id="result"></div>

</body>

</html>
